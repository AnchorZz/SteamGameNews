<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本周 Steam 推荐</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --ink: #171b22;
      --muted: #66707d;
      --line: #dfe4ea;
      --panel: #ffffff;
      --shadow: 0 18px 42px rgba(22, 29, 39, 0.10);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(180deg, #eef2f6 0, #f8fafc 360px, #f4f6f8 100%);
      font-family: "Avenir Next", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .shell { max-width: 1480px; margin: 0 auto; padding: 22px 20px 72px; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 0 18px;
      background: linear-gradient(180deg, rgba(244,246,248,0.98), rgba(244,246,248,0.74));
      backdrop-filter: blur(12px);
    }
    .brand { font-weight: 800; letter-spacing: 0; }
    nav { display: flex; gap: 8px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 14px;
      border: 1px solid transparent;
    }
    nav a.active, nav a:hover {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 30px 0 24px;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 44px; line-height: 1.1; letter-spacing: 0; }
    .subtitle { max-width: 760px; margin: 12px 0 0; color: var(--muted); line-height: 1.7; }
    .quick-stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .quick-stats span {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.8);
      font-size: 14px;
      color: var(--muted);
    }
    .section-band { padding-top: 34px; }
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .section-head h2 { margin: 0; font-size: 26px; letter-spacing: 0; }
    .section-head p { margin: 0; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .game-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .cover {
      display: block;
      position: relative;
      overflow: hidden;
      aspect-ratio: 460 / 215;
      background: #20242c;
      border-bottom: 4px solid var(--accent);
    }
    .cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.32), transparent 30%),
        linear-gradient(135deg, var(--accent), #242832 54%, #0f7173);
    }
    .cover::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 44%;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,0.35));
      pointer-events: none;
    }
    .cover img {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
    }
    .cover-copy {
      position: absolute;
      inset: 16px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      color: #fff;
    }
    .cover-copy b {
      align-self: flex-start;
      padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: var(--radius);
      background: rgba(0,0,0,0.18);
      font-size: 11px;
      letter-spacing: 0;
    }
    .cover-copy strong {
      max-width: 88%;
      font-size: 28px;
      line-height: 1.16;
      letter-spacing: 0;
    }
    .cover-copy small {
      max-width: 88%;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.35;
    }
    .card-body { padding: 16px; }
    .title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }
    h3 { margin: 0; font-size: 23px; line-height: 1.22; letter-spacing: 0; }
    .title-row p { margin: 6px 0 0; color: var(--muted); line-height: 1.45; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: var(--radius);
      color: #fff;
      background: var(--accent);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .tags, .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .pill, .metrics span {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfd;
      font-size: 13px;
    }
    .metrics b {
      margin-right: 6px;
      color: var(--accent);
      font-size: 12px;
    }
    dl { margin: 15px 0 0; }
    dl div {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 10px;
      line-height: 1.55;
    }
    dt { color: var(--muted); }
    dd { margin: 0; }
    .summary {
      margin: 14px 0 0;
      padding: 12px;
      border-radius: var(--radius);
      background: #f3f6f8;
      color: #27313d;
      line-height: 1.65;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .actions a {
      flex: 1;
      text-align: center;
      color: #fff;
      background: #1c6e77;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-weight: 800;
    }
    .actions a + a { background: #303847; }
    .archive-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 24px;
    }
    .archive-item {
      display: block;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(22, 29, 39, 0.06);
    }
    .archive-item span { display: block; color: var(--muted); margin-top: 6px; }
    @media (max-width: 760px) {
      .shell { padding: 14px 12px 56px; }
      .topbar, .hero, .section-head { align-items: start; flex-direction: column; display: flex; }
      nav { width: 100%; }
      nav a { flex: 1; text-align: center; }
      h1 { font-size: 34px; }
      .quick-stats { justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
      dl div { grid-template-columns: 1fr; gap: 3px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div class="brand">Steam 热门游戏推荐</div>
      <nav><a class="" href="../index.html">首页</a><a class="active" href="index.html">本周</a><a class="" href="../month/index.html">本月</a></nav>
    </div>
    <header class="hero">
      <div>
        <h1>本周 Steam 推荐</h1>
        <p class="subtitle">最近 7 天日报入口，方便快速回看本周候选。</p>
      </div>
      <div class="quick-stats">
        <span>每日自动更新</span>
        <span>首页显示最新</span>
        <span>本地封面资源</span>
      </div>
    </header>
    <div class="archive-list"><a class="archive-item" href="../reports/2026-04-26/index.html"><strong>2026-04-26</strong><span>Steam 热门游戏推荐 · 15 款游戏</span></a></div>
  </main>
</body>
</html>
